<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap</title>
    <link rel="stylesheet" href="./bootstrap-5.3.8-dist/bootstrap-5.3.8-dist/css/bootstrap.rtl.min.css">
</head>

<body>
    <div class="container">
        <div class="d-flex gap-2 justify-content-center py-5">
            <button class="badge text-bg-primary rounded-pill">primary</button>
            <button class="badge text-bg-secondary">button</button>
            <button class="badge text-bg-success rounded-pill">button</button>
            <button class="badge text-bg-danger">danger</button>
            <button class="badge text-bg-warning">button</button>
            <button class="badge text-bg-info">info</button>
            <button class="badge text-bg-light rounded-pill">light</button>
            <button class="badge text-bg-dark">dark</button>
        </div>
        <div class="b-example-divider"></div>
        <div class="d-flex gap-2 justify-content-center py-5">
            <div class="badge bg-primary-subtle text-primary-emphasis rounded-pill">primary</div>
            <div class="badge bg-secondary-subtle text-secondary-emphasis">secondary</div>
            <div class="badge bg-success-subtle text-success-emphasis rounded-pill">success</div>
            <div class="badge bg-danger-subtle text-danger-emphasis">danger</div>
        </div>
        <div class="b-example-divider"></div>
        <div class="d-flex gap-2 justify-content-center py-5">
            <div
                class="badge d-flex align-items-center p-1 pe-2 text-primary-emphasis bg-primary-subtle border border-primary-subtle rounded-pill">
                <img class="rounded-circle me-1" alt="user avatar" width="24" height="24" src="./avatar.jpg">
                primary
            </div>
            <div
                class="badge d-flex gap-2 justify-content-center p-1 pe-2 text-secondary-emphasis bg-secondary-subtle border border-secondary-subtle">
                <img src="./avatar.jpg" width="24" height="24" alt="user avatar" class="rounded-circle me-1">
                secondary
            </div>

        </div>
    </div>










    <script src="./bootstrap-5.3.8-dist/bootstrap-5.3.8-dist/js/bootstrap.js"></script>
</body>

</html>
